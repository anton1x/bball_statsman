name: Deploy app to VPS (frontend + backend)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'Dockerfile.frontend'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-backend-vps.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          source: "backend,src,nginx,index.html,package.json,package-lock.json,vite.config.js,Dockerfile.frontend,docker-compose.yml"
          target: ${{ secrets.VPS_APP_DIR }}

      - name: Restart app on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            docker compose up -d --build
            docker image prune -f
